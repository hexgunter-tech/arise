<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System: Status Window</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadPlayerData()">
    <div class="dashboard-grid">
        
        <aside class="system-panel profile-card">
            <h2 id="display-name">HUNTER</h2>
            <p class="rank-text">RANK: <span id="player-rank">E</span></p>
            <p class="job-title">Title: The New Recruit</p>
            <hr>
            <div class="stat-row"><span>LVL:</span> <span id="level">1</span></div>
            <div class="xp-container">
                <div class="xp-bar" style="width: 10%;"></div>
            </div>
            <div class="stat-detail">
                <p>Height: <span id="display-height">--</span> cm</p>
                <p>Weight: <span id="display-weight">--</span> kg</p>
            </div>
        </aside>

        <main class="system-panel main-content">
            <h3>DAILY QUESTS</h3>
            <div class="quest-list">
                <div class="quest-item">
                    <input type="checkbox" id="q1"> 
                    <label for="q1">Push-ups [0/100]</label>
                </div>
                <div class="quest-item">
                    <input type="checkbox" id="q2"> 
                    <label for="q2">Squats [0/100]</label>
                </div>
                <div class="quest-item">
                    <input type="checkbox" id="q3"> 
                    <label for="q3">Running [0/10km]</label>
                </div>
            </div>
            
            <h3 style="margin-top: 20px;">LEADERBOARD (Top Hunters)</h3>
            <table class="leaderboard">
                <tr><td>1. Sung Jin-woo</td><td>LVL 146</td></tr>
                <tr><td>2. Cha Hae-in</td><td>LVL 85</td></tr>
                <tr><td id="user-lb-name">3. You</td><td id="user-lb-lvl">LVL 1</td></tr>
            </table>
        </main>

    </div>

    <script>
        function loadPlayerData() {
            // Retrieve data from LocalStorage
            const name = localStorage.getItem('playerName') || "Unknown";
            const height = localStorage.getItem('playerHeight') || "0";
            const weight = localStorage.getItem('playerWeight') || "0";

            // Update the UI
            document.getElementById('display-name').innerText = name.toUpperCase();
            document.getElementById('display-height').innerText = height;
            document.getElementById('display-weight').innerText = weight;
            document.getElementById('user-lb-name').innerText = "3. " + name;

            // Simple Logic: If weight > 100, maybe they are "Tank" class? 
            // We can add more logic here later!
        }
    </script>
</body>
</html>
