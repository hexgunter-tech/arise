<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System: Inventory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; }

        .inventory-layout {
            display: flex; min-height: 100vh; width: 100vw;
            background: radial-gradient(circle at 75%, rgba(17,210,239,0.1) 0%, rgba(0,0,0,1) 100%);
        }

        /* LEFT SIDE */
        .storage-side { width: 55%; padding: 40px 60px; z-index: 10; }

        .inventory-header { border-bottom: 1px solid #11D2EF; padding-bottom: 10px; margin-bottom: 20px; }
        .inventory-header h1 { font-size: 1.8rem; letter-spacing: 6px; color: #11D2EF; text-shadow: 0 0 10px #11D2EF; margin: 0; }
        .gold-display { color: #FFD700; font-family: monospace; font-size: 1rem; margin-top: 5px; }

        /* TABS */
        .tab-row { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { background: #000; border: 1px solid #333; color: #555; padding: 8px 20px; cursor: pointer; font-size: 0.75rem; letter-spacing: 2px; }
        .tab-btn.active { border-color: #11D2EF; color: #11D2EF; }

        /* ARTIFACT GRID */
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 420px; }

        .item-slot {
            aspect-ratio: 1/1; background: rgba(17,210,239,0.03);
            border: 1px solid rgba(17,210,239,0.15); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }
        .item-slot:hover { border-color: #11D2EF; background: rgba(17,210,239,0.08); }
        .item-slot img { width: 60%; height: 60%; object-fit: contain; }

        .lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .lock-tag { font-size: 0.5rem; color: #555; letter-spacing: 1px; }
        .lock-status { font-size: 0.65rem; color: #ff4444; font-weight: bold; }
        .lock-lvl { font-size: 0.55rem; color: #11D2EF; font-family: monospace; }

        /* SKILLS SECTION */
        .skills-list { display: flex; flex-direction: column; gap: 8px; max-width: 500px; }

        .skill-card {
            background: rgba(17,210,239,0.03); border: 1px solid rgba(17,210,239,0.2);
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .skill-card.locked { opacity: 0.4; border-style: dashed; }
        .skill-card.equipped-s1 { border-color: #00FF44; background: rgba(0,255,68,0.05); }
        .skill-card.equipped-s2 { border-color: #9d4edd; background: rgba(157,78,221,0.05); }

        .skill-info { flex: 1; }
        .skill-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 3px; }
        .skill-meta { font-size: 0.65rem; color: #555; font-family: monospace; }

        .skill-actions { display: flex; gap: 5px; }
        .equip-btn {
            background: none; border: 1px solid; padding: 4px 10px;
            cursor: pointer; font-size: 0.65rem; font-weight: bold; letter-spacing: 1px;
        }
        .equip-btn.slot1 { border-color: #00FF44; color: #00FF44; }
        .equip-btn.slot2 { border-color: #9d4edd; color: #9d4edd; }
        .equip-btn:hover { opacity: 0.7; }
        .equip-btn:disabled { border-color: #333; color: #333; cursor: not-allowed; }

        .equipped-badge { font-size: 0.6rem; padding: 2px 6px; border: 1px solid; margin-right: 5px; }
        .badge-s1 { border-color: #00FF44; color: #00FF44; }
        .badge-s2 { border-color: #9d4edd; color: #9d4edd; }

        /* EQUIPPED SLOTS DISPLAY */
        .equipped-display {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(17,210,239,0.2);
            padding: 15px; margin-bottom: 20px; max-width: 500px;
        }
        .equipped-title { font-size: 0.7rem; color: #555; font-family: monospace; letter-spacing: 2px; margin-bottom: 10px; }
        .slot-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; margin-bottom: 5px; border: 1px solid; }
        .slot-row.s1 { border-color: rgba(0,255,68,0.3); }
        .slot-row.s2 { border-color: rgba(157,78,221,0.3); }
        .slot-name { font-size: 0.8rem; font-family: monospace; }
        .unequip-btn { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 2px 8px; cursor: pointer; font-size: 0.65rem; }

        /* RIGHT SIDE */
        .character-side { width: 45%; display: flex; align-items: flex-end; justify-content: center; position: relative; }
        #char-img { height: 85vh; filter: drop-shadow(0 0 30px rgba(17,210,239,0.3)); }
        .stats-overlay { position: absolute; top: 40px; right: 40px; text-align: right; }
        .stats-overlay b { color: #11D2EF; font-size: 2rem; display: block; letter-spacing: 4px; }
        .stats-overlay span { color: #fff; font-size: 1rem; font-family: monospace; opacity: 0.7; }

        .back-btn { position: fixed; bottom: 30px; left: 60px; z-index: 9999; background: rgba(0,0,0,0.8); border: 1px solid #11D2EF; color: #11D2EF; padding: 12px 24px; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
        .back-btn:hover { background: #11D2EF; color: #000; }

        /* Status message */
        #status-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,5,10,0.95); border: 1px solid #00FF44; color: #00FF44; padding: 10px 30px; font-family: monospace; font-size: 0.8rem; display: none; z-index: 9999; }
    </style>
</head>

            renderSkills();
            renderItems();

            // Fill empty slots
            for (let i = myArtifacts.length; i < 16; i++) {
                grid.innerHTML += `<div class="item-slot"></div>`;
            }
        }

        function renderSkills() {
            const list = document.getElementById('skills-list');
            list.innerHTML = '';

            const prefix = CHAR_PREFIX[player.class];
            if (!prefix) { list.innerHTML = '<p style="color:#555;">Select a character first</p>'; return; }

            const currentRank = getRank(player.level);
            const currentRankIndex = RANK_ORDER.indexOf(currentRank);

            // Update equipped display
            const s1 = player.equippedSkills.slot1;
            const s2 = player.equippedSkills.slot2;
            document.getElementById('equipped-s1-name').innerText = s1 && SKILL_DB[s1] ? SKILL_DB[s1].name : '— EMPTY —';
            document.getElementById('equipped-s2-name').innerText = s2 && SKILL_DB[s2] ? SKILL_DB[s2].name : '— EMPTY —';
            document.getElementById('equipped-s1-name').style.color = s1 && SKILL_DB[s1] ? SKILL_DB[s1].color : '#555';
            document.getElementById('equipped-s2-name').style.color = s2 && SKILL_DB[s2] ? SKILL_DB[s2].color : '#555';

            RANK_ORDER.forEach((rank, i) => {
                const skillId = `${prefix}_${rank.toLowerCase().replace('+', 'plus')}`;
                const skill = SKILL_DB[skillId];
                if (!skill) return;

                const isLocked = i > currentRankIndex;
                const isS1 = player.equippedSkills.slot1 === skillId;
                const isS2 = player.equippedSkills.slot2 === skillId;

                let cardClass = 'skill-card';
                if (isLocked) cardClass += ' locked';
                if (isS1) cardClass += ' equipped-s1';
                if (isS2) cardClass += ' equipped-s2';

                list.innerHTML += `
                    <div class="${cardClass}">
                        <div class="skill-info">
                            <div class="skill-title" style="color:${skill.color}">
                                ${isS1 ? '<span class="equipped-badge badge-s1">SLOT 1</span>' : ''}
                                ${isS2 ? '<span class="equipped-badge badge-s2">SLOT 2</span>' : ''}
                                ${skill.name}
                            </div>
                            <div class="skill-meta">
                                RANK ${skill.rank} | ${skill.mpCost} MP | ${skill.dmgMult}x DMG
                                ${isLocked ? ' | 🔒 LOCKED' : ' | ✅ UNLOCKED'}
                            </div>
                        </div>
                        ${!isLocked ? `
                        <div class="skill-actions">
                            <button class="equip-btn slot1" onclick="equipSkill('${skillId}', 1)" ${isS1 ? 'disabled' : ''}>S1</button>
                            <button class="equip-btn slot2" onclick="equipSkill('${skillId}', 2)" ${isS2 ? 'disabled' : ''}>S2</button>
                        </div>` : '<div style="color:#555; font-size:0.7rem; padding:5px;">LOCKED</div>'}
                    </div>
                `;
            });
        }

        function renderItems() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';
            const customInv = player.inventory || [];

            if (customInv.length === 0) {
                grid.innerHTML = '<p style="color:#333; font-family:monospace; font-size:0.8rem; grid-column:1/-1;">No items in storage. Visit the shop!</p>';
                return;
            }

            customInv.forEach(item => {
                grid.innerHTML += `
                    <div class="item-slot">
                        <img src="${item.image}" onerror="this.style.display='none'">
                        <div style="font-size:0.55rem; color:#11D2EF; text-align:center; padding:2px;">${item.name}</div>
                        <div style="position:absolute; bottom:3px; right:5px; font-size:0.65rem; color:#FFD700;">x${item.qty}</div>
                    </div>`;
            });

            for (let i = customInv.length; i < 8; i++) {
                grid.innerHTML += `<div class="item-slot"></div>`;
            }
        }

        function equipSkill(skillId, slot) {
            if (!player.equippedSkills) player.equippedSkills = { slot1: null, slot2: null };
            
            if (slot === 1) player.equippedSkills.slot1 = skillId;
            else player.equippedSkills.slot2 = skillId;

            localStorage.setItem(currentUser, JSON.stringify(player));
            const skill = SKILL_DB[skillId];
            showStatus(`✅ ${skill.name} equipped to Slot ${slot}!`);
            renderSkills();
        }

        function unequipSkill(slot) {
            if (!player.equippedSkills) return;
            if (slot === 1) player.equippedSkills.slot1 = null;
            else player.equippedSkills.slot2 = null;
            localStorage.setItem(currentUser, JSON.stringify(player));
            showStatus(`Slot ${slot} cleared!`);
            renderSkills();
        }

        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
