<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <title>System: Status</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { animation: none !important; transition: none !important; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: url('images/background.png') no-repeat center center fixed; background-size: cover; overflow: hidden; height: 100vh; color: #fff; font-family: 'Segoe UI', sans-serif; }

        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%),
                        linear-gradient(90deg, rgba(17,210,239,0.03), rgba(17,210,239,0.01), rgba(17,210,239,0.03));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .name-tag-container { position: absolute; top: 8%; right: 10%; text-align: right; z-index: 10; }
        #display-player-name { color: #11D2EF; font-size: 3rem; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 15px #11D2EF; }
        #display-player-lvl { background: #11D2EF; color: #000; padding: 2px 15px; font-weight: bold; margin-top: 5px; display: inline-block; }

        #battle-card {
            position: absolute; top: 50%; right: 165px; width: 320px;
            background: rgba(0,0,0,0.9); border: 1px solid #11D2EF;
            padding: 20px; z-index: 10; display: none;
            transform: translateY(-50%);
        }

        .card-header { display: flex; justify-content: space-between; color: #11D2EF; font-family: monospace; font-size: 0.8rem; border-bottom: 1px solid rgba(17,210,239,0.3); padding-bottom: 8px; margin-bottom: 12px; }
        
        .rank-badge { 
            padding: 2px 8px; font-weight: bold; font-size: 0.75rem;
            border: 1px solid; display: inline-block; margin-bottom: 10px;
        }

        .skills-section { margin: 10px 0; }
        .skills-label { font-size: 0.6rem; color: #555; font-family: monospace; letter-spacing: 2px; margin-bottom: 8px; }
        
        .skill-slot {
            background: rgba(17,210,239,0.05); border: 1px solid rgba(17,210,239,0.2);
            padding: 8px 12px; margin-bottom: 6px; display: flex;
            justify-content: space-between; align-items: center;
            font-family: monospace; font-size: 0.8rem;
        }

        .skill-slot.empty { color: #333; border-style: dashed; }
        .skill-name { color: #00FF44; }
        .skill-mp { color: #11D2EF; font-size: 0.7rem; }

        .card-footer { display: flex; justify-content: space-between; margin-top: 12px; background: rgba(17,210,239,0.05); padding: 10px; border-top: 1px solid rgba(17,210,239,0.2); }
        .footer-stat { display: flex; flex-direction: column; align-items: center; }
        .footer-stat span { font-size: 0.6rem; color: #11D2EF; }
        .footer-stat b { font-size: 1rem; }

        .char-container { position: absolute; bottom: 0; right: 0; width: 50%; height: 90vh; display: flex; justify-content: center; align-items: flex-end; z-index: 5; }
        #main-char-img { max-height: 95%; filter: drop-shadow(0 0 20px rgba(17,210,239,0.4)); cursor: pointer; }

        .side-menu { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 200; width: 200px; }
        .small-btn { width: 100%; height: 50px; background: #000; border: 1px solid #11D2EF; color: #11D2EF; cursor: pointer; font-size: 1rem; display: flex; align-items: center; padding-left: 15px; gap: 10px; text-align: left; }
        .small-btn:hover { background: #11D2EF; color: #000; }

        .xp-display { position: absolute; bottom: 30px; left: 220px; width: 350px; }
        .xp-bar { width: 100%; height: 10px; background: #111; border: 1px solid #333; margin-top: 5px; }
        #xp-fill { height: 100%; background: #11D2EF; width: 0%; box-shadow: 0 0 10px #11D2EF; }

        /* New skill unlock notification */
        #skill-notify {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,5,10,0.95); border: 1px solid #00FF44;
            color: #00FF44; padding: 12px 30px; font-weight: bold;
            letter-spacing: 2px; display: none; z-index: 1000;
            box-shadow: 0 0 20px rgba(0,255,68,0.4); font-family: monospace;
        }
    </style>
</head>

            'S+': { min:95, max:999, color:'#fff',    next:'MAX RANK ACHIEVED' }
        };

        // Character to skill prefix map
        const CHAR_PREFIX = {
            'Jin-Woo': 'jinwoo',
            'Asta': 'asta',
            'Gojo': 'gojo',
            'Toji': 'toji',
            'Ippo': 'ippo',
            'Garou': 'garou',
            'Tanjiro': 'tanjiro',
            'Thorfinn': 'thorfinn'

        function getRank(level) {
            if (level >= 95) return 'S+';
            if (level >= 80) return 'S';
            if (level >= 60) return 'A';
            if (level >= 40) return 'B';
            if (level >= 20) return 'C';
            if (level >= 10) return 'D';
            return 'E';
        }

        function getUnlockedSkills(charClass, level) {
            const prefix = CHAR_PREFIX[charClass];
            if (!prefix) return [];
            const rank = getRank(level);
            const rankOrder = ['E', 'D', 'C', 'B', 'A', 'S', 'S+'];
            const currentRankIndex = rankOrder.indexOf(rank);
            const unlocked = [];
            rankOrder.forEach((r, i) => {
                if (i <= currentRankIndex) {
                    const skillId = `${prefix}_${r.toLowerCase().replace('+', 'plus')}`;
                    if (SKILL_DB[skillId]) unlocked.push(SKILL_DB[skillId]);
                }
            });
            return unlocked;
        }

        function initHome() {
            const currentUserName = localStorage.getItem('currentUser');
            if (!currentUserName) { window.location.href = 'register.html'; return; }

            let player = JSON.parse(localStorage.getItem(currentUserName));

            // Init equipped skills if not exists
            if (!player.equippedSkills) {
                player.equippedSkills = { slot1: null, slot2: null };
                localStorage.setItem(currentUserName, JSON.stringify(player));
            }

            // Update UI
            document.getElementById('display-player-name').innerText = player.name.toUpperCase();
            document.getElementById('display-player-lvl').innerText = 'LVL ' + player.level;
            document.getElementById('card-class').innerText = 'CLASS: ' + (player.class || 'NONE').toUpperCase();
            document.getElementById('main-char-img').src = player.imgFull || '';
            document.getElementById('card-str').innerText = player.str;
            document.getElementById('card-spd').innerText = player.spd;
            document.getElementById('card-stm').innerText = player.stm;
            document.getElementById('p-gold').innerText = (player.gold || 0).toLocaleString();

            // XP bar
            const xpNeeded = Math.floor(1000 * (player.level * player.level * 0.5));
            const xpPercent = (player.xp / xpNeeded) * 100;
            document.getElementById('xp-fill').style.width = Math.min(xpPercent, 100) + '%';
            const xpRemaining = xpNeeded - player.xp;
document.getElementById('xp-text').innerText = `${player.xp} / ${xpNeeded} XP`;
window._xpInfo = { xp: player.xp, xpNeeded, xpRemaining, level: player.level };
            // Rank
            const rank = getRank(player.level);
            const rankInfo = RANK_DATA[rank];
            document.getElementById('card-rank').innerText = 'RANK: ' + rank;
            document.getElementById('card-rank').style.color = rankInfo.color;

            // Equipped skills display
            updateSkillDisplay(player);
        }

        function updateSkillDisplay(player) {
            const slot1 = player.equippedSkills?.slot1;
            const slot2 = player.equippedSkills?.slot2;

            const slot1El = document.getElementById('slot1-display');
            const slot2El = document.getElementById('slot2-display');

            if (slot1 && SKILL_DB[slot1]) {
                const sk = SKILL_DB[slot1];
                slot1El.innerHTML = `<span class="skill-name" style="color:${sk.color}">${sk.name}</span><span class="skill-mp">${sk.mpCost} MP</span>`;
            } else {
                slot1El.innerHTML = `<span class="skill-name" style="color:#333">— SLOT 1 EMPTY —</span><span></span>`;
            }

            if (slot2 && SKILL_DB[slot2]) {
                const sk = SKILL_DB[slot2];
                slot2El.innerHTML = `<span class="skill-name" style="color:${sk.color}">${sk.name}</span><span class="skill-mp">${sk.mpCost} MP</span>`;
            } else {
                slot2El.innerHTML = `<span class="skill-name" style="color:#333">— SLOT 2 EMPTY —</span><span></span>`;
            }
        }

        function toggleCard() {
            const card = document.getElementById('battle-card');
            card.style.display = card.style.display === 'none' ? 'block' : 'none';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'register.html';
        }
        function toggleXPInfo() {
    const txt = document.getElementById('xp-text');
    const info = window._xpInfo;
    if (!info) return;
    if (txt.dataset.showing === 'remaining') {
        txt.innerText = `${info.xp} / ${info.xpNeeded} XP`;
        txt.style.color = '#555';
        txt.dataset.showing = 'current';
    } else {
        txt.innerText = `⚡ ${info.xpRemaining} XP until Level ${info.level + 1}`;
        txt.style.color = '#FFD700';
        txt.dataset.showing = 'remaining';
        setTimeout(() => {
            txt.innerText = `${info.xp} / ${info.xpNeeded} XP`;
            txt.style.color = '#555';
            txt.dataset.showing = 'current';
        }, 3000);
    }
}
    </script>
