<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System: Purchase Goods</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
        }

        .shop-container {
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; padding: 20px;
            background: radial-gradient(circle at 50% 100%, rgba(17, 210, 239, 0.1) 0%, #000 100%);
            box-sizing: border-box;
        }

        .shop-header { border-bottom: 2px solid #11D2EF; width: 90%; max-width: 800px; text-align: center; margin-bottom: 20px; }
        .shop-header h1 { letter-spacing: 8px; color: #11D2EF; text-shadow: 0 0 10px #11D2EF; margin: 10px 0; font-size: 1.5rem; }
        .balance { color: #FFD700; font-family: monospace; font-size: 1.1rem; margin-bottom: 10px; }

        /* SCROLLABLE AREA FIX */
        .scroll-area {
            width: 100%;
            max-width: 950px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
            /* Hide scrollbar for Chrome/Safari */
            -webkit-overflow-scrolling: touch;
        }
        .scroll-area::-webkit-scrollbar { display: none; } /* Hide scrollbar */

        .items-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Responsive columns */
            gap: 15px; 
            padding-bottom: 80px; /* Space for back button */
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(17, 210, 239, 0.2);
            padding: 15px; text-align: center; transition: 0.3s;
            position: relative;
        }
        .shop-item:hover { border-color: #11D2EF; background: rgba(17, 210, 239, 0.05); transform: translateY(-3px); }

        .item-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .item-name { font-weight: bold; color: #11D2EF; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .item-desc { font-size: 0.7rem; color: #888; height: 35px; display: block; line-height: 1.2; }
        .item-price { color: #FFD700; font-family: monospace; display: block; margin: 10px 0; font-size: 1rem; }

        .buy-btn {
            background: transparent; border: 1px solid #11D2EF; color: #11D2EF;
            padding: 10px; cursor: pointer; font-weight: bold; width: 100%;
            font-size: 0.8rem; letter-spacing: 1px;
        }
        .buy-btn:hover:not(:disabled) { background: #11D2EF; color: #000; box-shadow: 0 0 15px rgba(17, 210, 239, 0.4); }
        .buy-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        .back-btn { 
            position: fixed; bottom: 30px; left: 30px; 
            z-index: 100;
        }
    </style>
</head>
<body onload="initShop()">

    <div class="shop-container">
        <div class="shop-header">
            <h1>SYSTEM STORE</h1>
            <div class="balance">CREDITS: <span id="p-gold">0</span>G</div>
        </div>

        <div class="scroll-area">
            <div class="items-grid" id="shop-grid">
                </div>
        </div>
    </div>

    <button class="back-btn small-btn" onclick="window.location.href='home.html'">🏠 RETURN</button>

    <script>
        const currentUser = localStorage.getItem('currentUser');
        let player = JSON.parse(localStorage.getItem(currentUser));

        const stock = [
            { id: 'p_red', name: "Healing Potion", desc: "Restores 50% HP in battle.", price: 500, icon: "🧪" },
            { id: 'p_blue', name: "Mana Elixir", desc: "Instant 100 MP recovery.", price: 800, icon: "💎" },
            { id: 'scroll_tele', name: "Dungeon Map", desc: "Reveals hidden rooms in Gates.", price: 2500, icon: "📜" },
            { id: 'buff_str', name: "Protein Shake", desc: "Permanent +1 Strength.", price: 10000, icon: "🥤" },
            { id: 'buff_spd', name: "Energy Drink", desc: "Permanent +1 Speed.", price: 10000, icon: "⚡" },
            { id: 'mystery_box', name: "C-Rank Crate", desc: "Random gear or gold inside.", price: 5000, icon: "📦" }
        ];

        function initShop() {
            if (!currentUser || !player) { window.location.href = 'register.html'; return; }
            updateUI();
        }

        function updateUI() {
            document.getElementById('p-gold').innerText = player.gold.toLocaleString();
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = "";

            stock.forEach(item => {
                const canAfford = player.gold >= item.price;
                grid.innerHTML += `
                    <div class="shop-item">
                        <span class="item-icon">${item.icon}</span>
                        <span class="item-name">${item.name}</span>
                        <span class="item-desc">${item.desc}</span>
                        <span class="item-price">${item.price}G</span>
                        <button class="buy-btn" ${canAfford ? '' : 'disabled'} 
                            onclick="buyItem('${item.id}', ${item.price})">
                            ${canAfford ? 'PURCHASE' : 'INSUFFICIENT FUNDS'}
                        </button>
                    </div>
                `;
            });
        }

        function buyItem(itemId, price) {
            if (player.gold < price) return;

            player.gold -= price;
            if (!player.inventory) player.inventory = [];
            
            const existingItem = player.inventory.find(i => i.id === itemId);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                const itemData = stock.find(s => s.id === itemId);
                player.inventory.push({
                    id: itemData.id,
                    name: itemData.name,
                    image: `https://via.placeholder.com/50/000?text=${itemData.icon}`, // Placeholder for real image
                    qty: 1
                });
            }

            if (itemId === 'buff_str') player.str += 1;
            if (itemId === 'buff_spd') player.spd += 1;

            localStorage.setItem(currentUser, JSON.stringify(player));
            updateUI();
        }
    </script>
</body>
</html>
